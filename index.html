<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Fun Quiz Game</title>
        <style>
            body {
                  font-family: 'Poppins', sans-serif;
                        background: linear-gradient(135deg, #89f7fe, #66a6ff);
                              text-align: center;
                                    padding: 50px;
                                        }
                                            h1 { color: #333; }
                                                .quiz-container {
                                                      background: white;
                                                            padding: 20px;
                                                                  border-radius: 10px;
                                                                        max-width: 500px;
                                                                              margin: auto;
                                                                                    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
                                                                                        }
                                                                                            .question { font-size: 1.2em; margin-bottom: 20px; }
                                                                                                .option {
                                                                                                      display: block;
                                                                                                            margin: 10px 0;
                                                                                                                  padding: 10px;
                                                                                                                        border-radius: 8px;
                                                                                                                              background: #f0f0f0;
                                                                                                                                    cursor: pointer;
                                                                                                                                          transition: 0.3s;
                                                                                                                                              }
                                                                                                                                                  .option:hover { background: #d0e6ff; }
                                                                                                                                                      #result { margin-top: 20px; font-size: 1.2em; font-weight: bold; }
                                                                                                                                                          #score, #timer, #progress { margin: 10px; font-weight: bold; }
                                                                                                                                                              .progress-bar {
                                                                                                                                                                    width: 100%;
                                                                                                                                                                          background: #ddd;
                                                                                                                                                                                border-radius: 10px;
                                                                                                                                                                                      margin: 10px 0;
                                                                                                                                                                                          }
                                                                                                                                                                                              .progress-fill {
                                                                                                                                                                                                    height: 15px;
                                                                                                                                                                                                          width: 0%;
                                                                                                                                                                                                                background: #66a6ff;
                                                                                                                                                                                                                      border-radius: 10px;
                                                                                                                                                                                                                            transition: width 0.5s;
                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                  </style>
                                                                                                                                                                                                                                  </head>
                                                                                                                                                                                                                                  <body>
                                                                                                                                                                                                                                    <h1>🧠 Fun Quiz Game 🧠</h1>
                                                                                                                                                                                                                                      <div class="quiz-container">
                                                                                                                                                                                                                                          <div id="score">Score: 0</div>
                                                                                                                                                                                                                                              <div id="timer">Time left: 15s</div>
                                                                                                                                                                                                                                                  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                          <div class="question" id="question"></div>
                                                                                                                                                                                                                                                              <div id="options"></div>
                                                                                                                                                                                                                                                                  <p id="result"></p>
                                                                                                                                                                                                                                                                      <button onclick="nextQuestion()">Next Question</button>
                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                          <script>
                                                                                                                                                                                                                                                                              const quizData = [
                                                                                                                                                                                                                                                                                    { question: "Which planet is known as the Red Planet?", options: ["Earth","Mars","Jupiter","Venus"], answer: "Mars" },
                                                                                                                                                                                                                                                                                          { question: "Who invented the light bulb?", options: ["Nikola Tesla","Thomas Edison","Albert Einstein","Isaac Newton"], answer: "Thomas Edison" },
                                                                                                                                                                                                                                                                                                { question: "What is the capital of Japan?", options: ["Beijing","Seoul","Tokyo","Bangkok"], answer: "Tokyo" }
                                                                                                                                                                                                                                                                                                    ];

                                                                                                                                                                                                                                                                                                        let currentQuestion = 0;
                                                                                                                                                                                                                                                                                                            let score = 0;
                                                                                                                                                                                                                                                                                                                let timer;
                                                                                                                                                                                                                                                                                                                    let timeLeft = 15;

                                                                                                                                                                                                                                                                                                                        function loadQuestion() {
                                                                                                                                                                                                                                                                                                                              document.getElementById("question").innerText = quizData[currentQuestion].question;
                                                                                                                                                                                                                                                                                                                                    const optionsDiv = document.getElementById("options");
                                                                                                                                                                                                                                                                                                                                          optionsDiv.innerHTML = "";
                                                                                                                                                                                                                                                                                                                                                quizData[currentQuestion].options.forEach(option => {
                                                                                                                                                                                                                                                                                                                                                        const btn = document.createElement("div");
                                                                                                                                                                                                                                                                                                                                                                btn.innerText = option;
                                                                                                                                                                                                                                                                                                                                                                        btn.classList.add("option");
                                                                                                                                                                                                                                                                                                                                                                                btn.onclick = () => checkAnswer(option);
                                                                                                                                                                                                                                                                                                                                                                                        optionsDiv.appendChild(btn);
                                                                                                                                                                                                                                                                                                                                                                                              });
                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById("result").innerText = "";
                                                                                                                                                                                                                                                                                                                                                                                                          updateProgress();
                                                                                                                                                                                                                                                                                                                                                                                                                resetTimer();
                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                        function checkAnswer(selected) {
                                                                                                                                                                                                                                                                                                                                                                                                                              if (selected === quizData[currentQuestion].answer) {
                                                                                                                                                                                                                                                                                                                                                                                                                                      document.getElementById("result").innerText = "✅ Correct!";
                                                                                                                                                                                                                                                                                                                                                                                                                                              score++;
                                                                                                                                                                                                                                                                                                                                                                                                                                                      document.getElementById("score").innerText = "Score: " + score;
                                                                                                                                                                                                                                                                                                                                                                                                                                                            } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById("result").innerText = "❌ Wrong!";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                clearInterval(timer);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function nextQuestion() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              currentQuestion++;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (currentQuestion < quizData.length) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            loadQuestion();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  } else {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          document.getElementById("question").innerText = "🎉 Quiz Completed!";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  document.getElementById("options").innerHTML = "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          document.getElementById("result").innerText = "Final Score: " + score + "/" + quizData.length;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  document.getElementById("timer").innerText = "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function resetTimer() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      clearInterval(timer);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            timeLeft = 15;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  document.getElementById("timer").innerText = "Time left: " + timeLeft + "s";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        timer = setInterval(() => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                timeLeft--;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById("timer").innerText = "Time left: " + timeLeft + "s";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (timeLeft <= 0) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          clearInterval(timer);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById("result").innerText = "⏰ Time's up!";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }, 1000);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          function updateProgress() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const progress = ((currentQuestion) / quizData.length) * 100;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      document.getElementById("progress").style.width = progress + "%";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              loadQuestion();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </html>
